<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Undangan Arif & Shinta</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background: #f8f8f8;
      color: #333;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(255,255,255,0.7), rgba(255,255,255,0.9)),
      url('https://images.unsplash.com/photo-1519741497674-611481863552');
      background-size: cover;
      background-position: center;
    }

    h1 {
      font-size: 42px;
      font-weight: 600;
    }

    p {
      font-size: 18px;
      font-weight: 300;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #111;
      color: white;
      border-radius: 10px;
      cursor: pointer;
      border: none;
    }

    .section {
      padding: 60px 20px;
    }

    .card {
      background: white;
      padding: 30px;
      border-radius: 15px;
      max-width: 500px;
      margin: auto;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
    }
  </style>
</head>

<body>

  <!-- HERO -->
  <section class="hero">
    <p>Undangan Pernikahan</p>
    <h1>Arif & Shinta</h1>
    <p>20 April 2026 • 08.00 WITA</p>
    <div id="countdown"></div>
    <button class="btn" id="openBtn">Buka Undangan</button>
  </section>

  <!-- KATA KATA -->
  <section class="section">
    <div class="card">
      <p>
        Dengan penuh kebahagiaan, kami mengundang Anda untuk hadir dan memberikan doa restu
        pada hari bahagia kami.
      </p>
    </div>
  </section>

  <!-- DETAIL -->
  <section class="section">
    <div class="card">
      <h2>Detail Acara</h2>
      <p>Senin, 20 April 2026</p>
      <p>Pukul 08.00 WITA</p>
      <p>Jl. Jend Sudirman No.1, Banjarmasin</p>
      <a class="btn" href="https://maps.app.goo.gl/eRoSosoaaeonTccH7" target="_blank">Buka Maps</a>
    </div>
  </section>

  <!-- RSVP -->
  <section class="section">
    <div class="card">
      <h2>Konfirmasi Kehadiran</h2>
      <input type="text" id="nama" placeholder="Nama">
      <input type="text" id="jumlah" placeholder="Jumlah orang">
      <button class="btn" onclick="kirimWA()">Kirim ke WhatsApp</button>
    </div>
  </section>

  <!-- MUSIC -->
  <audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mp3">
  </audio>

  <!-- SCRIPT -->
  <script>
    const target = new Date("April 20, 2026 08:00:00").getTime();

    setInterval(() => {
      const now = new Date().getTime();
      const diff = target - now;

      const d = Math.floor(diff / (1000*60*60*24));
      const h = Math.floor((diff/(1000*60*60))%24);
      const m = Math.floor((diff/(1000*60))%60);

      document.getElementById("countdown").innerHTML =
        d + " hari " + h + " jam " + m + " menit";
    }, 1000);

    window.onload = function() {
      const btn = document.getElementById("openBtn");
      const music = document.getElementById("music");

      btn.addEventListener("click", function() {
        music.play();
        btn.innerText = "Undangan Dibuka";
      });
    };

    function kirimWA() {
      const nama = document.getElementById("nama").value;
      const jumlah = document.getElementById("jumlah").value;

      const nomor = "62882021112892";

      const text = `Halo, saya ${nama}, konfirmasi hadir ${jumlah} orang.`;
      const url = `https://wa.me/${nomor}?text=${encodeURIComponent(text)}`;

      window.open(url, "_blank");
    }
  </script>

</body>
</html>
